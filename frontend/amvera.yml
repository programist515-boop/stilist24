# Amvera Cloud application config — frontend (Next.js standalone).
# Docs: https://docs.amvera.ru/applications/configuration.html
#
# ВАЖНО: Amvera НЕ поддерживает Docker --build-arg. NEXT_PUBLIC_API_URL
# захардкожен в frontend/Dockerfile ARG default — это единственный способ
# передать build-time переменную в Amvera. При смене URL — редактируем
# Dockerfile, пушим → Amvera пересоберёт.
#
# Phase 2 — технический домен: https://stilist24-api.expertgds.amvera.io
# Phase 4 — кастомный домен:   https://api.stilist24.com

meta:
  environment: docker
  toolchain:
    name: docker
    version: latest

build:
  dockerfile: Dockerfile

run:
  containerPort: 3000
  persistenceMount: /data
