name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend build + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8002

  test-backend:
    name: Backend logic tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-stylist-starter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml "pydantic[email]>=2.8" "pydantic-settings>=2.3"
      - name: Run pure-logic tests
        env:
          PYTHONPATH: .
          STORAGE_BACKEND: memory
        run: |
          pytest -q \
            tests/test_rules.py \
            tests/test_scoring.py \
            tests/test_scoring_engine.py \
            tests/test_outfit_engine_step4.py

  deploy:
    name: Deploy to stilist24.com
    needs: [test-frontend, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          FASHN_API_KEY: ${{ secrets.FASHN_API_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        with:
          host: 194.67.99.214
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: JWT_SECRET,POSTGRES_PASSWORD,S3_ACCESS_KEY,S3_SECRET_KEY,FASHN_API_KEY,NEXT_PUBLIC_API_URL
          script_stop: true
          script: |
            set -e
            cd /home/ubuntu/stilist24-com

            git fetch origin main
            git reset --hard origin/main

            cat > .env.prod <<EOF
            APP_NAME=AI Stylist API
            DEBUG=false
            DATABASE_URL=postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/aistylist
            POSTGRES_DB=aistylist
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            REDIS_URL=redis://redis:6379/0
            STORAGE_BACKEND=s3
            S3_ENDPOINT_URL=http://minio:9000
            S3_ACCESS_KEY=${S3_ACCESS_KEY}
            S3_SECRET_KEY=${S3_SECRET_KEY}
            S3_BUCKET=ai-stylist
            FASHN_API_KEY=${FASHN_API_KEY}
            FASHN_BASE_URL=https://api.fashn.ai
            JWT_SECRET=${JWT_SECRET}
            JWT_ALGORITHM=HS256
            JWT_ACCESS_MINUTES=60
            NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
            S3_PUBLIC_BASE_URL=https://stilist24.com/s3
            EOF
            chmod 600 .env.prod

            # Retry docker build: Docker Hub TLS handshakes occasionally flake.
            attempt=1
            until docker compose -p stilist24com -f docker-compose.prod.yml --env-file .env.prod up -d --build; do
              if [ $attempt -ge 3 ]; then
                echo "docker compose up failed after $attempt attempts"
                exit 1
              fi
              attempt=$((attempt + 1))
              echo "Build failed, retrying (attempt $attempt)..."
              sleep 10
            done
            docker image prune -f

            echo "Waiting for API health..."
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8002/docs >/dev/null 2>&1; then
                echo "API up"; break
              fi
              sleep 2
            done

            echo "Waiting for web..."
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3002/ >/dev/null 2>&1; then
                echo "Web up"; break
              fi
              sleep 2
            done
