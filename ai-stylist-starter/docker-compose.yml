services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - minio
      - createbuckets

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aistylist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # One-shot bucket bootstrap — provisions the ai-stylist bucket after
  # MinIO is up. Keeps the application process free of bucket-creation
  # side effects. Safe to run repeatedly; `mb --ignore-existing` is
  # idempotent.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin}) do
        echo 'waiting for minio...' && sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing local/${S3_BUCKET:-ai-stylist};
      /usr/bin/mc anonymous set download local/${S3_BUCKET:-ai-stylist} || true;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
