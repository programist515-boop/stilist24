# Attribute editability rules:
# source "cv" = detected by computer vision → editable by user
# source "manual" = set by user → editable
# source "import" = imported from external data → editable
# source "default" = fallback value when no detection → editable
# Non-editable fields: id, user_id, created_at (not in attributes schema)

editable_by_source:
  cv: true
  manual: true
  import: true
  default: true

# Legacy value mappings: normalize old free-text values to ontology terms
legacy_color_map:
  white: white
  black: black
  grey: grey
  gray: grey
  navy: navy
  navy blue: navy
  blue: blue
  red: red
