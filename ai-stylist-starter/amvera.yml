# Amvera Cloud application config — backend (FastAPI).
# Docs: https://docs.amvera.ru/applications/configuration.html
#
# Схема выверена по реальному UI Amvera. Командой запуска управляет
# CMD из Dockerfile.prod (`sh /app/entrypoint.sh` — alembic upgrade head +
# uvicorn :8002), поэтому run.command тут пустой.
#
# Все runtime-переменные (DATABASE_URL, REDIS_URL, S3_*, JWT_SECRET,
# CORS_ALLOW_ORIGINS, OPENAI_*, FASHN_*) задаются в UI Amvera через
# раздел «Переменные окружения» — см. amvera-api.env в корне репо.

meta:
  environment: docker
  toolchain:
    name: docker
    version: latest

build:
  dockerfile: Dockerfile.prod

run:
  containerPort: 8002
  persistenceMount: /data
