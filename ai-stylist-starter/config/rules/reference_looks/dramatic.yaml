subtype: dramatic
primary_look_id: dr_sheath_power_dress
reference_looks:

  - id: dr_power_suit
    name: "Деловой power-костюм"
    style: office
    season_hint: all
    image_url: "/reference_looks/dramatic/dr_power_suit.jpg"
    items:
      - slot: blazer
        requires:
          category: blazer
          pending_cut_lines: sharp
          pending_structure: tailored
          pending_shoulder: structured
          pending_proportion: elongated
        optional: false
      - slot: bottom
        requires:
          category: trousers
          pending_cut_lines: sharp
          pending_silhouette: straight_narrow
          pending_length: full
        optional: false
      - slot: shoes
        requires:
          category: [heels, pointed_flats]
          pending_toe_shape: pointed
          pending_detail_scale: minimal
        optional: false
    accessories:
      - type: bag
        requires:
          pending_structure: structured
          pending_silhouette: elongated
          pending_detail_scale: minimal
    notes:
      - "Удлинённый жакет + прямые брюки создают одну вертикаль — главный эффект для Dramatic"
      - "Никаких плавных линий, только чёткая геометрия"

  - id: dr_sheath_power_dress
    name: "Платье-футляр длиной миди"
    style: office
    season_hint: all
    image_url: "/reference_looks/dramatic/dr_sheath_power_dress.jpg"
    items:
      - slot: dress
        requires:
          category: dress
          fit: sheath
          pending_cut_lines: sharp
          pending_structure: tailored
          pending_length: midi
          pending_neckline: [v_deep, straight]
        optional: false
      - slot: shoes
        requires:
          category: heels
          pending_toe_shape: pointed
          pending_heel_type: stiletto
        optional: false
    accessories:
      - type: bag
        requires:
          pending_structure: structured
          pending_detail_scale: minimal
    notes:
      - "Платье-футляр с V-образным вырезом удлиняет силуэт"
      - "Стилет и заострённый мыс — необходимые элементы завершения линии"

  - id: dr_evening_column
    name: "Вечернее платье-колонна"
    style: evening
    season_hint: all
    image_url: "/reference_looks/dramatic/dr_evening_column.jpg"
    items:
      - slot: dress
        requires:
          category: dress
          pending_silhouette: column
          pending_cut_lines: sharp
          pending_fabric_rigidity: [medium, rigid]
          pending_length: maxi
        optional: false
      - slot: shoes
        requires:
          category: heels
          pending_heel_type: stiletto
        optional: false
    accessories:
      - type: clutch
        requires:
          pending_structure: structured
          pending_silhouette: elongated
      - type: jewelry
        requires:
          pending_detail_scale: [medium, large]
          pending_cut_lines: angular
        count_max: 2
    notes:
      - "Длинная вертикаль платья-колонны — идеальный фасон"
      - "Украшения — удлинённые, геометричные"

  - id: dr_maxi_coat_column
    name: "Макси-пальто поверх колонны"
    style: weekend
    season_hint: autumn_winter
    image_url: "/reference_looks/dramatic/dr_maxi_coat_column.jpg"
    items:
      - slot: outerwear
        requires:
          category: [long_coat, wool_coat]
          pending_length: [maxi, mid_calf_long]
          pending_cut_lines: sharp
          pending_structure: tailored
          pending_silhouette: straight_column
        optional: false
      - slot: top
        requires:
          category: [turtleneck, fine_knit_top]
          pending_cut_lines: clean
          pending_fit: slim
        optional: false
      - slot: bottom
        requires:
          category: [straight_trousers, slim_trousers]
          pending_silhouette: straight_narrow
          pending_length: full
        optional: false
      - slot: shoes
        requires:
          category: [knee_high_boots, pointed_heels]
          pending_toe_shape: pointed
          pending_detail_scale: minimal
        optional: false
    accessories:
      - type: bag
        requires:
          pending_structure: structured
          pending_silhouette: elongated
    notes:
      - "Макси-пальто усиливает вертикаль подтипа — плюс к росту"
      - "Узкий гольф + узкие брюки под пальто = одна непрерывная линия"

  - id: dr_leather_minimal
    name: "Кожаные брюки и кашемир"
    style: smart_casual
    season_hint: autumn_winter
    image_url: "/reference_looks/dramatic/dr_leather_minimal.jpg"
    items:
      - slot: top
        requires:
          category: [turtleneck, fine_knit_top]
          pending_fabric: [cashmere, merino_fine]
          pending_cut_lines: clean
          pending_fit: slim
        optional: false
      - slot: bottom
        requires:
          category: [leather_trousers, coated_trousers]
          pending_silhouette: straight_narrow
          pending_fabric: [leather, coated_denim]
          pending_fabric_finish: matte
        optional: false
      - slot: shoes
        requires:
          category: [heels, ankle_boots_sharp]
          pending_heel_type: stiletto
          pending_toe_shape: pointed
        optional: false
    accessories:
      - type: bag
        requires:
          pending_structure: structured
          pending_detail_scale: minimal
      - type: jewelry
        optional: true
        requires:
          pending_detail_scale: large
          pending_cut_lines: angular
        count_max: 1
    notes:
      - "Одна мощная деталь (крупные серьги или клатч) — хватит на весь лук"
      - "Кожа и кашемир создают намеренную фактуру без принта"

global_stop_items:
  - pending_cut_lines: [soft_flowing, curved, ruffled]
  - pending_structure: unstructured
  - pending_proportion: cropped_rounded
  - pending_pattern_character: [watercolor, small_floral_soft, ditsy]
  - category: [peasant_blouse, circle_skirt, babydoll_dress]
  - pending_detail_scale: tiny
