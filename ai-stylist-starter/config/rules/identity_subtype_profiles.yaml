# Метаданные подтипов: ассоциации характера, девиз, философия, галерея звёзд.
# Используется в explainer.py и на фронте (карточка "Кто ты стилистически").
# Ключи совпадают с именами rules в identity_subtypes.yaml.
#
# Статус наполнения:
#   - flamboyant_gamine: полное наполнение из PDF "Типаж Г.Д." (2026-04-21)
#   - остальные 12 подтипов (2026-04-22): LLM-черновик по методологии Kibbe +
#     community-верификация через WebSearch (r/Kibbe wiki, kibbebody.com,
#     подборки Aly Art, разборы в рунете). См. plans/enumerated-seeking-fern.md.
#     Celebrity_examples собраны как community_consensus: 4 западных (где это
#     возможно — Kibbe-verified) + 4 русских. Западные стабильнее: рус. имена
#     помечены ориентирами, а не вердиктами Кибби — рекомендуется дисклеймер в UI.

identity_subtype_profiles:

  flamboyant_gamine:
    display_name_ru: "Гамин-Драматик"
    display_name_en: "Flamboyant Gamine"
    family: gamine
    associations:
      - оторва
      - креативная
      - вызывающая
      - смелая
      - непокорная
      - эксцентричная
      - запоминающаяся
    motto: "Правила были созданы, чтобы их нарушать!"
    philosophy: >
      Самый выразительный типаж. Быть серой мышкой — не про вас.
      Совершенно не классический типаж, далёкий от общепризнанного идеала красоты.
      Стремиться к нему — пустая трата времени и сил. Вы были созданы, чтобы блистать
      на сцене и слышать аплодисменты в свой адрес. Принять себя такой, какая есть —
      первый шаг к созданию вашего стиля. Не стремиться быть женственной, милой,
      идеальной, а стремиться быть яркой и запоминающейся — вот секрет вашего успеха.
    key_principles:
      - "Контрастные верх и низ"
      - "Разбитый, прерывистый силуэт"
      - "Чёткие формы — геометрия, а не плавность"
      - "Акцент на плечи (никаких рукавов реглан)"
      - "Высокий контраст цвета"
    celebrity_examples:
      - name: "Одри Хепбёрн"
        era: "1950s–1960s"
      - name: "Кристина Орбакайте"
      - name: "Алёна Свиридова"
      - name: "Мэг Райан"
      - name: "Кристал Ренн"
      - name: "Кьяра Ферраньи"
      - name: "Тина Сизонова"
      - name: "Алсу"

  # --- Остальные 12 подтипов: placeholder, наполнить при получении гайдов ---

  dramatic:
    display_name_ru: "Драматик"
    display_name_en: "Dramatic"
    family: dramatic
    associations:
      - властная
      - магнетичная
      - бескомпромиссная
      - величественная
      - графичная
      - независимая
      - командная
    motto: "Вертикаль, острота, намерение — никаких полумер."
    philosophy: >
      Ваш типаж — чистый yang в длинной вертикали. Высокий рост или визуально
      длинные линии, узкие плечи, прямые кости, острые скулы, чёткий
      подбородок. В вас нет округлости, и попытки её добавить всегда
      читаются как подражание. Ваша задача не в том, чтобы стать мягче,
      доступнее или «женственнее» — ваша задача в том, чтобы усиливать
      длину и остроту, потому что именно они делают вас магнетичной. Dramatic
      часто боится своей силы, прячась в мягкие ткани и округлые формы. В
      них фигура читается как «костлявая» и «жёсткая», хотя в драматичной
      правильной геометрии она же превращается в королевскую. Ваш стиль —
      длинная линия, матовая или плотная ткань, монохром или контраст без
      полутонов, одна точная деталь, которая ставит восклицательный знак.
      Не прячьтесь в оверсайз, не копируйте lush romantic, не играйте в
      gamine. Ваша формула — вертикаль, острый край и намерение. Вас нужно
      видеть целиком.
    key_principles:
      - "Удлинённый силуэт: макси-юбка прямая, длинный жакет, платье-колонна, палаццо-брюки, длинное пальто"
      - "Острые вырезы: глубокий V, высокая стойка, асимметрия, прямоугольник"
      - "Матовые и жёсткие ткани: кожа, плотный шёлк, креп твёрдый, габардин, лён жёсткий"
      - "Монохром или контраст чёрное-белое: без пастельного соседства и мелких градиентов"
      - "Крупные геометричные принты или их полное отсутствие: крупная графика или моно"
      - "Масштабные чёткие аксессуары: длинные линейные серьги, крупная структурная сумка, каблук-столбик"
    celebrity_examples:
      - name: "Tilda Swinton"
      - name: "Cate Blanchett"
      - name: "Anjelica Huston"
      - name: "Taylor Swift"
      - name: "Рената Литвинова"
      - name: "Ксения Собчак"
      - name: "Татьяна Михалкова"
      - name: "Екатерина Стриженова"

  soft_dramatic:
    display_name_ru: "Мягкий Драматик"
    display_name_en: "Soft Dramatic"
    family: dramatic
    associations:
      - роскошная
      - статная
      - чувственно-острая
      - впечатляющая
      - яркая
      - фатальная
      - магнетичная
    motto: "Пышность в длинной линии — это не избыток, а особая геометрия."
    philosophy: >
      Ваш типаж — dramatic с яркими yin-формами: высокий рост, длинная
      вертикаль, но в теле выраженные грудь и бёдра, а в лице — одновременно
      острые скулы и полные губы, большие глаза. Это два сильных полюса в
      одной фигуре, и именно их сочетание даёт эффект «divy». Soft dramatic
      часто совершает одну из двух ошибок: прячет пышные формы в прямой
      оверсайз (и читается как тяжёлая) или выбирает миниатюрные детали
      вместо своего масштаба (и читается как не влезающая в образ). Ваша
      фигура не предусматривает аккуратности — в вас всё крупное, и это
      нужно уважать. Ваш стиль — длинная облегающая линия, плотная
      драпирующаяся ткань, глубокий насыщенный цвет, крупный жест. Вам идёт
      декольте, высокий каблук, массивное украшение. Не уходите в casual
      простоту, не копируйте romantic миниатюру, не прячьте талию. Ваша
      формула — длинная линия + плотная пышность + одна мощная деталь. Вас
      должно быть много, и это правильно.
    key_principles:
      - "Длинный облегающий силуэт: платье-колонна с декольте, макси с запахом, приталенный длинный жакет"
      - "Глубокие драматичные вырезы: V в пол, halter, sweetheart, one-shoulder"
      - "Плотные драпирующиеся ткани: шёлк с весом, атлас, бархат, жаккард, джерси плотный"
      - "Насыщенные глубокие цвета: винный, изумруд, сапфир, бордо, эспрессо, пурпур"
      - "Крупные принты: анималистика, пейсли, крупная абстракция — без пастельной мелочи"
      - "Массивные аксессуары: крупные серьги, шпилька, меховой воротник, широкий браслет"
    celebrity_examples:
      - name: "Sophia Loren"
        era: "1950s–1970s"
      - name: "Ava Gardner"
        era: "1940s–1950s"
      - name: "Monica Bellucci"
      - name: "Barbra Streisand"
      - name: "Людмила Чурсина"
        era: "1960s–1980s"
      - name: "Светлана Лобода"
      - name: "Маша Распутина"
      - name: "Татьяна Буланова"

  flamboyant_natural:
    display_name_ru: "Драматик-Натурал"
    display_name_en: "Flamboyant Natural"
    family: natural
    associations:
      - свободная
      - раскованная
      - энергичная
      - открытая
      - статная
      - спортивно-сильная
      - широкая
    motto: "Простор и сила — это одно лицо красоты."
    philosophy: >
      Ваш типаж — длинная вертикаль с широкими расслабленными линиями и
      тупыми костями. Высокий рост, широкие плечи, длинные конечности,
      атлетичная фигура, лицо с прямоугольным или квадратным контуром и
      чёткой скулой без острой кромки. Вы не dramatic с узкой королевской
      линией и не natural со средним масштабом — вы крупнее обычного и
      расслабленнее обычного одновременно. Flamboyant natural часто
      старается «вписаться в женственность», надевая маленькие детали или
      romantic-платья. Это читается как несоответствие масштабу, как
      большой человек в маленькой комнате. Ваша сила в откровенном
      масштабе и расслабленной уверенности: вы не боретесь со своей
      атлетичной природой, а делаете её стилем. Ваш стиль — крупные
      простые силуэты, плотные натуральные ткани, земляные цвета,
      крупные аксессуары без ювелирной мелочи. Не смягчайте себя
      miniature-размерами, не уходите в drama-длину, не копируйте
      romantic облегание. Ваша формула — пространство в крое + натуральная
      фактура + одна крупная деталь.
    key_principles:
      - "Крупный расслабленный силуэт: oversize блейзер, wide-leg брюки, длинное платье-рубашка, свободное пальто"
      - "Простые прямые вырезы: V, лодочка, square, поло — без декоративных деталей"
      - "Натуральные плотные ткани: деним, сукно, вельвет, кожа, грубый лён, шерсть-твид"
      - "Земляные насыщенные цвета: хаки, тёмно-зелёный, ржавый, терракот, индиго, винный"
      - "Крупные сдержанные принты: крупная клетка, широкая полоска, leopard крупный, tie-dye сдержанный"
      - "Массивные аксессуары: крупный ремень, вместительная сумка, ковбойский сапог, браслет-манжет"
    celebrity_examples:
      - name: "Julia Roberts"
      - name: "Cameron Diaz"
      - name: "Cindy Crawford"
      - name: "Princess Diana"
        era: "1980s–1990s"
      - name: "Наталья Водянова"
      - name: "Алёна Бабенко"
      - name: "Мария Голубкина"
      - name: "Анна Ковальчук"

  soft_natural:
    display_name_ru: "Мягкий Натурал"
    display_name_en: "Soft Natural"
    family: natural
    associations:
      - уютная
      - тёплая
      - гармоничная
      - приветливая
      - живая
      - женственно-спокойная
      - плавная
    motto: "Лёгкость и мягкость — не робость, а свобода движений."
    philosophy: >
      Ваш типаж — natural с доминирующим yin. Средний рост, ширина плеч и
      бёдер сбалансирована, талия выражена сильнее, чем у pure natural,
      а линии тела мягкие и плавные без острых углов. Лицо — округлое,
      с большими глазами и полными губами, без жёсткой скулы. Вы —
      женственность без драмы, «девушка, с которой легко»: вас не хочется
      ставить на пьедестал, с вами хочется быть рядом. Soft natural часто
      пытается стать более structured (чтобы «выглядеть взрослее») или
      копирует romantic (чтобы подчеркнуть кривые). Первое делает вас
      визуально тяжелее, второе — перенасыщает. Ваша линия работает через
      мягкое облегание и лёгкие драпировки, через ткани, которые текут, но
      не блестят. Ваш стиль — wrap-платья, свободные приталенные жакеты,
      карамельные тёплые цвета, флоральные принты средней мягкости. Не
      играйте в строгий монохром, не уходите в оверсайз, не подчёркивайте
      острые контуры. Ваша формула — мягкое облегание, тёплая ткань и
      подчёркнутая талия без корсетной строгости.
    key_principles:
      - "Мягкий облегающий силуэт: wrap-платье, приталенный жакет свободного кроя, клёш-миди, рубашка с ремнём"
      - "Мягкие округлые вырезы: V с округлением, сердечко, лодочка средней глубины, лёгкие драпировки"
      - "Мягкие натуральные ткани: вискоза, струящийся шёлк, кашемир, плотный трикотаж, льняной микс"
      - "Тёплые натуральные цвета: карамель, персик, оливка, пудровый розовый, кремовый, золотистый бежевый"
      - "Органические мягкие принты: цветочная акварель, etno, мягкая полоска, пейсли средний"
      - "Мягкие аксессуары: сумка с плавной линией, лоферы, балетки, плотный широкий ремень"
    celebrity_examples:
      - name: "Jennifer Lopez"
      - name: "Scarlett Johansson"
      - name: "Doris Day"
        era: "1950s–1960s"
      - name: "Britney Spears"
      - name: "Юлия Снигирь"
      - name: "Елена Корикова"
      - name: "Ульяна Лаптева"
      - name: "Мария Шарапова"

  natural:
    display_name_ru: "Натурал"
    display_name_en: "Natural"
    family: natural
    associations:
      - естественная
      - свободная
      - искренняя
      - открытая
      - лёгкая
      - атлетичная
      - доступная
    motto: "Расслабленность — это высшая форма уверенности."
    philosophy: >
      Ваш типаж — средний рост со сбалансированной шириной, тупые кости,
      ровные не-острые черты лица, линия, свободная от напряжения. В вас нет
      ни драматичной вертикали, ни romantic кривых, ни gamine миниатюрности.
      Вы — органика, которая не пытается быть изящнее или резче, чем есть.
      Это не «обделённость», а редкое сочетание: вашу внешность читают как
      «свою», вам доверяют с первой секунды, и это работает и в карьере, и
      в частной жизни. Natural часто стесняется своего типа и пытается
      смягчиться romantic-ремнями или ужесточиться drama-длиной. И первое,
      и второе убирает вашу главную черту — естественность. Ваш стиль
      строится на добротных натуральных тканях, прямых простых силуэтах,
      сдержанных земляных цветах и деталях, которые выглядят как будто
      были у вас всегда. Не добавляйте оборки ради женственности, не
      растягивайтесь длинной линией, не играйте в миниатюрность. Ваша
      формула — качественная ткань, простая линия и одна деталь с
      характером, которая держит весь образ.
    key_principles:
      - "Прямой расслабленный силуэт: рубашка-oversize лёгкая, прямые брюки, платье-миди свободное, тренч"
      - "Простые вырезы без драмы: V умеренный, лодочка, квадрат, стойка"
      - "Натуральные ткани с текстурой: лён, хлопок плотный, шерсть-меланж, замша, деним"
      - "Нейтральные натуральные цвета: хаки, бежевый, серо-коричневый, тёмно-зелёный, серый меланж"
      - "Сдержанные классические принты: средняя полоска, классическая клетка, гусиная лапка, натуральный леопард"
      - "Практичные аксессуары с характером: кожаный ремень, tote-сумка, лоферы, часы на кожаном ремешке"
    celebrity_examples:
      - name: "Jennifer Aniston"
      - name: "Meghan Markle"
      - name: "Priyanka Chopra"
      - name: "Elle Macpherson"
      - name: "Чулпан Хаматова"
      - name: "Светлана Ходченкова"
      - name: "Надежда Михалкова"
      - name: "Елена Подкаминская"

  dramatic_classic:
    display_name_ru: "Драматик-Классик"
    display_name_en: "Dramatic Classic"
    family: classic
    associations:
      - строгая
      - собранная
      - сдержанная
      - отточенная
      - интеллигентная
      - дисциплинированная
      - точная
    motto: "Дисциплина кроя — элегантнее любого декора."
    philosophy: >
      Ваш типаж — баланс с акцентом на yang. Рост средний, пропорции
      симметричны, но в чертах лица и линиях тела есть чёткая острота:
      прямые плечи, ясные скулы, сдержанный подбородок. Это не драматичная
      длина и не romantic мягкость — это классическая рамка, натянутая
      точнее обычного. Соблазн DC — уйти в полную нейтральность и стать
      «просто деловой». Тогда ваша острота теряется, и образ читается как
      усталый. Второй соблазн — пытаться смягчиться ради женственности; это
      ломает вашу линию и делает фигуру визуально тяжёлой. Ваша сила — в
      безупречно выверенной линии без излишеств. Вы — профессионал на первом
      плане: собранная, читающаяся как компетентность. Лучшая ставка — чистые
      геометричные силуэты, строгие ткани, монохром или максимум двуцветный
      образ, одна качественная ювелирная деталь. Не увлекайтесь оверсайзом,
      не копируйте лёгкую небрежность natural, не добавляйте декор ради
      декора. Ваша формула — архитектура кроя, благородный цвет и
      дисциплина.
    key_principles:
      - "Прямой контурный силуэт: структурный жакет, юбка-карандаш, брючный костюм, платье-футляр с плечами"
      - "Острые вырезы с точностью: V умеренной глубины, прямоугольник, рубашечный с жёстким воротником"
      - "Строгие ткани: габардин, плотная шерсть, твид, кожа, плотный шёлк, крепдешин"
      - "Монохром или максимум два цвета: графит, тёмно-синий, бордо, винный, сдержанный белый"
      - "Минимум или геометрия в принтах: тонкая полоска, Prince of Wales, ёлочка — без органики"
      - "Чёткие аксессуары: часы с прямоугольным циферблатом, структурная сумка, туфли-лодочки с острым носком"
    celebrity_examples:
      - name: "Jacqueline Kennedy Onassis"
        era: "1960s–1970s"
      - name: "Diane Kruger"
      - name: "Olivia Munn"
      - name: "Naomi Scott"
      - name: "Ирина Хакамада"
      - name: "Эвелина Хромченко"
      - name: "Елена Летучая"
      - name: "Ольга Кабо"

  soft_classic:
    display_name_ru: "Мягкий Классик"
    display_name_en: "Soft Classic"
    family: classic
    associations:
