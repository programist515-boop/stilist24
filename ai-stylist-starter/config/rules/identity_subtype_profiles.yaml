  gamine:
    display_name_ru: "Гамин"
    display_name_en: "Gamine"
    family: gamine
    associations:
      - дерзкая
      - задорная
      - любопытная
      - озорная
      - графичная
      - свежая
      - хулиганистая
    motto: "Быть маленькой — не уменьшение, а концентрация."
    philosophy: >
      Ваш типаж строится на контрасте внутри миниатюры. Тело прямое и узкое,
      линии чёткие, а лицо — округлое, живое, с большими глазами и
      контрастными чертами. Это не «ребёнок в теле взрослой», а точно
      выверенная композиция двух противоположностей в одном человеке.
      Отсюда ваша сила: вы не теряетесь в толпе, несмотря на рост, потому что
      в вас слишком много движения и противоречия, чтобы вас пропустить.
      Стремиться к длинноногой, плавной или мягко-женственной эстетике —
      пустая трата энергии: у вас совсем другая задача. Ваш стиль — геометрия
      в компактности, принт в масштабе ладони, воротник-стойка рядом со
      свободной линией штанины. Чем точнее вы работаете с пропорциями и
      контрастом, тем меньше вас читают как «малышку» и тем больше — как
      графичный, собранный, независимый образ. Не становитесь романтичной, не
      растягивайтесь визуально длинными линиями, не прячьтесь в
      бесформенности. Ваша формула — точность, игра и дерзость на маленьком
      холсте.
    key_principles:
      - "Длина верха выше бедра или точно на талии — никаких длинных свободных туник"
      - "Воротник, не растягивающий вертикаль: стойка, Питер Пэн, бантик, маленький лацкан"
      - "Принт в масштабе ладони: горох, клетка 2–3 см, графика, мини-звёзды — не крупный цветок"
      - "Контраст фактур в одном образе: гладкое + структурное, мат + глянец"
      - "Акцент на талию без романтики: ремень, шов, жилет — не драпировка, не оборка"
      - "Аксессуары маленькие и чёткие: очки-стекляшки, короткие серьги, сумка-коробка, плоский носок"
    celebrity_examples:
