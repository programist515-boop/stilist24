# Метаданные подтипов: ассоциации характера, девиз, философия, галерея звёзд.
# Используется в explainer.py и на фронте (карточка "Кто ты стилистически").
# Ключи совпадают с именами rules в identity_subtypes.yaml.
#
# Статус наполнения:
#   - flamboyant_gamine: полное наполнение из PDF "Типаж Г.Д." (2026-04-21)
#   - gamine: LLM-черновик по методологии Kibbe + WebSearch community-verified
#     (Leslie Caron/Mia Farrow/Emma Watson/Janelle Monáe из kibbebody.com и
#     community-обсуждений, русские — по разборам в рунете, помечены как
#     community_consensus)
#   - остальные: placeholder-структура, TODO наполнить из соответствующих гайдов

identity_subtype_profiles:

  flamboyant_gamine:
    display_name_ru: "Гамин-Драматик"
    display_name_en: "Flamboyant Gamine"
    family: gamine
    associations:
      - оторва
      - креативная
      - вызывающая
      - смелая
      - непокорная
      - эксцентричная
      - запоминающаяся
    motto: "Правила были созданы, чтобы их нарушать!"
    philosophy: >
      Самый выразительный типаж. Быть серой мышкой — не про вас.
      Совершенно не классический типаж, далёкий от общепризнанного идеала красоты.
      Стремиться к нему — пустая трата времени и сил. Вы были созданы, чтобы блистать
      на сцене и слышать аплодисменты в свой адрес. Принять себя такой, какая есть —
      первый шаг к созданию вашего стиля. Не стремиться быть женственной, милой,
      идеальной, а стремиться быть яркой и запоминающейся — вот секрет вашего успеха.
    key_principles:
      - "Контрастные верх и низ"
      - "Разбитый, прерывистый силуэт"
      - "Чёткие формы — геометрия, а не плавность"
      - "Акцент на плечи (никаких рукавов реглан)"
      - "Высокий контраст цвета"
    celebrity_examples:
      - name: "Одри Хепбёрн"
        era: "1950s–1960s"
      - name: "Кристина Орбакайте"
      - name: "Алёна Свиридова"
      - name: "Мэг Райан"
      - name: "Кристал Ренн"
      - name: "Кьяра Ферраньи"
      - name: "Тина Сизонова"
      - name: "Алсу"

