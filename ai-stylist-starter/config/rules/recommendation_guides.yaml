recommendation_guides:
  dramatic:
    style_key: "Длинная вертикаль, острые линии, крупный масштаб"
    summary: >-
      Ваша природа — длина, острота и чистая вертикаль. Лучше всего вы
      смотритесь в образах с сильной линией, отчётливой архитектурой и
      тканями, которые держат форму. Избегайте мягкости, мелких деталей и
      уютных округлостей — они спорят с вашей внутренней геометрией.
    closing_note: >-
      Правило одного образа: одна сильная вертикальная линия, одна крупная
      деталь, одна точная акцентная точка. Всё остальное работает в
      поддержке.
    sections:
      - key: "lines_silhouette"
        title: "Линии и силуэт"
        description: >-
          Удлинённые, острые, архитектурные силуэты. Линии должны читаться
          одним непрерывным движением сверху вниз.
        recommended:
          - text: Прямые, узкие, удлинённые силуэты
            slug: pryamye_uzkie_udlinennye_siluety
            image: /recommendations/dramatic/lines_silhouette/pryamye_uzkie_udlinennye_siluety.jpg
          - text: Острые плечи и чёткие лацканы
            slug: ostrye_plechi_i_chetkie
            image: /recommendations/dramatic/lines_silhouette/ostrye_plechi_i_chetkie.jpg
          - text: Строгие колонны — платья-футляры, брюки-сигареты, длинные пальто
            slug: strogie_kolonny_platya_futlyary
            image: /recommendations/dramatic/lines_silhouette/strogie_kolonny_platya_futlyary.jpg
          - text: Одна длинная вертикаль — монохром, длинный жакет, высокая посадка
            slug: odna_dlinnaya_vertikal_monohrom
            image: /recommendations/dramatic/lines_silhouette/odna_dlinnaya_vertikal_monohrom.jpg
          - text: Контрастные разрезы и удлиняющие швы
            slug: kontrastnye_razrezy_i_udlinyayuschie
            image: /recommendations/dramatic/lines_silhouette/kontrastnye_razrezy_i_udlinyayuschie.jpg
        avoid:
          - text: Округлые, мягкие, «детские» силуэты
            slug: okruglye_myagkie_detskie_siluety
            image: /recommendations/dramatic/lines_silhouette/okruglye_myagkie_detskie_siluety.jpg
          - text: Многослойность с мелкими оборками
            slug: mnogosloinost_s_melkimi_oborkami
            image: /recommendations/dramatic/lines_silhouette/mnogosloinost_s_melkimi_oborkami.jpg
          - text: Пышные юбки миди и романтические формы
            slug: pyshnye_yubki_midi_i
            image: /recommendations/dramatic/lines_silhouette/pyshnye_yubki_midi_i.jpg
          - text: Укороченные куртки с кукольными пропорциями
            slug: ukorochennye_kurtki_s_kukolnymi
            image: /recommendations/dramatic/lines_silhouette/ukorochennye_kurtki_s_kukolnymi.jpg
      - key: "necklines"
        title: "Вырезы и горловины"
        description: >-
          Линия выреза должна продолжать вертикаль и подчёркивать длину
          шеи и остроту ключиц.
        recommended:
          - text: V-образный и глубокий V
            slug: v_obraznyi_i_glubokii
            image: /recommendations/dramatic/necklines/v_obraznyi_i_glubokii.jpg
          - text: Острый каре с прямыми углами
            slug: ostryi_kare_s_pryamymi
            image: /recommendations/dramatic/necklines/ostryi_kare_s_pryamymi.jpg
          - text: Широкий лодочный при крепкой плечевой линии
            slug: shirokii_lodochnyi_pri_krepkoi
            image: /recommendations/dramatic/necklines/shirokii_lodochnyi_pri_krepkoi.jpg
          - text: Высокая стойка в сочетании с открытым декольте спины
            slug: vysokaya_stoika_v_sochetanii
            image: /recommendations/dramatic/necklines/vysokaya_stoika_v_sochetanii.jpg
          - text: Асимметричный вырез на одно плечо
            slug: asimmetrichnyi_vyrez_na_odno
            image: /recommendations/dramatic/necklines/asimmetrichnyi_vyrez_na_odno.jpg
        avoid:
          - text: Круглый мягкий вырез с рюшами
            slug: kruglyi_myagkii_vyrez_s
            image: /recommendations/dramatic/necklines/kruglyi_myagkii_vyrez_s.jpg
          - text: Питер-пэн и мелкие воротнички
            slug: piter_pen_i_melkie
            image: /recommendations/dramatic/necklines/piter_pen_i_melkie.jpg
          - text: Горловины с оборками и присборенные волны
            slug: gorloviny_s_oborkami_i
            image: /recommendations/dramatic/necklines/gorloviny_s_oborkami_i.jpg
      - key: "fabrics"
        title: "Ткани"
        description: >-
          Материалы должны держать форму и давать чёткий блик или
          графичную матовость.
        recommended:
          - text: Габардин, тонкая камвольная шерсть, плотный креп
            slug: gabardin_tonkaya_kamvolnaya_sherst
            image: /recommendations/dramatic/fabrics/gabardin_tonkaya_kamvolnaya_sherst.jpg
          - text: Кожа и эко-кожа с гладкой поверхностью
            slug: kozha_i_eko_kozha
            image: /recommendations/dramatic/fabrics/kozha_i_eko_kozha.jpg
          - text: Жаккард с крупным геометрическим рисунком
            slug: zhakkard_s_krupnym_geometricheskim
            image: /recommendations/dramatic/fabrics/zhakkard_s_krupnym_geometricheskim.jpg
          - text: Шёлк-сатин, дюшес, тафта
            slug: shelk_satin_dyushes_tafta
            image: /recommendations/dramatic/fabrics/shelk_satin_dyushes_tafta.jpg
          - text: Плотный атлас и полированный хлопок
            slug: plotnyi_atlas_i_polirovannyi
            image: /recommendations/dramatic/fabrics/plotnyi_atlas_i_polirovannyi.jpg
        avoid:
          - text: Букле, вязаный пух, ворсистый твид
            slug: bukle_vyazanyi_puh_vorsistyi
            image: /recommendations/dramatic/fabrics/bukle_vyazanyi_puh_vorsistyi.jpg
          - text: Мягкий кашемир без структуры
            slug: myagkii_kashemir_bez_struktury
            image: /recommendations/dramatic/fabrics/myagkii_kashemir_bez_struktury.jpg
          - text: Хлопковая марля и лёгкий муслин
            slug: hlopkovaya_marlya_i_legkii
            image: /recommendations/dramatic/fabrics/hlopkovaya_marlya_i_legkii.jpg
          - text: Шифон с мелкой оборкой
            slug: shifon_s_melkoi_oborkoi
            image: /recommendations/dramatic/fabrics/shifon_s_melkoi_oborkoi.jpg
      - key: "textures"
        title: "Фактуры"
        description: >-
          Фактура работает на вас, когда она графична и даёт свет, а не
          пушистость.
        recommended:
          - text: Гладкие полированные поверхности
            slug: gladkie_polirovannye_poverhnosti
            image: /recommendations/dramatic/textures/gladkie_polirovannye_poverhnosti.jpg
          - text: Блестящая кожа, патент, металлик
            slug: blestyaschaya_kozha_patent_metallik
            image: /recommendations/dramatic/textures/blestyaschaya_kozha_patent_metallik.jpg
          - text: Крупный рельеф с чёткими линиями
            slug: krupnyi_relef_s_chetkimi
            image: /recommendations/dramatic/textures/krupnyi_relef_s_chetkimi.jpg
        avoid:
          - text: Мохер, ангора, пушистые трикотажи
            slug: moher_angora_pushistye_trikotazhi
            image: /recommendations/dramatic/textures/moher_angora_pushistye_trikotazhi.jpg
          - text: Мятые, случайные, «домашние» фактуры
            slug: myatye_sluchainye_domashnie_faktury
            image: /recommendations/dramatic/textures/myatye_sluchainye_domashnie_faktury.jpg
          - text: Мелкий декоративный ворс
            slug: melkii_dekorativnyi_vors
            image: /recommendations/dramatic/textures/melkii_dekorativnyi_vors.jpg
      - key: "prints"
        title: "Принты"
        description: >-
          Принт — это ещё одна линия. Работают крупные, графичные и
          контрастные мотивы.
        recommended:
          - text: Крупная геометрия и полоса
            slug: krupnaya_geometriya_i_polosa
            image: /recommendations/dramatic/prints/krupnaya_geometriya_i_polosa.jpg
          - text: Абстрактные мазки большого масштаба
            slug: abstraktnye_mazki_bolshogo_masshtaba
            image: /recommendations/dramatic/prints/abstraktnye_mazki_bolshogo_masshtaba.jpg
          - text: Контрастный анималистический принт
            slug: kontrastnyi_animalisticheskii_print
            image: /recommendations/dramatic/prints/kontrastnyi_animalisticheskii_print.jpg
          - text: Строгая клетка виндзор или глен
            slug: strogaya_kletka_vindzor_ili
            image: /recommendations/dramatic/prints/strogaya_kletka_vindzor_ili.jpg
        avoid:
          - text: Мелкий цветочек и горошек
            slug: melkii_tsvetochek_i_goroshek
            image: /recommendations/dramatic/prints/melkii_tsvetochek_i_goroshek.jpg
          - text: Акварельные растяжки без чёткой формы
            slug: akvarelnye_rastyazhki_bez_chetkoi
            image: /recommendations/dramatic/prints/akvarelnye_rastyazhki_bez_chetkoi.jpg
          - text: Сладкие пейсли с мелким узором
            slug: sladkie_peisli_s_melkim
            image: /recommendations/dramatic/prints/sladkie_peisli_s_melkim.jpg
      - key: "details"
        title: "Детали и декор"
        description: >-
          Детали — точечные и крупные. Меньше элементов, но каждый
          читается.
        recommended:
          - text: Острые металлические элементы
            slug: ostrye_metallicheskie_elementy
            image: /recommendations/dramatic/details/ostrye_metallicheskie_elementy.jpg
          - text: Крупные пуговицы и массивная фурнитура
            slug: krupnye_pugovitsy_i_massivnaya
            image: /recommendations/dramatic/details/krupnye_pugovitsy_i_massivnaya.jpg
          - text: Чёткие складки и стрелки
            slug: chetkie_skladki_i_strelki
            image: /recommendations/dramatic/details/chetkie_skladki_i_strelki.jpg
          - text: Графичные лацканы и прямые манжеты
            slug: grafichnye_latskany_i_pryamye
            image: /recommendations/dramatic/details/grafichnye_latskany_i_pryamye.jpg
        avoid:
          - text: Бантики, рюши, оборки
            slug: bantiki_ryushi_oborki
            image: /recommendations/dramatic/details/bantiki_ryushi_oborki.jpg
          - text: Мелкая вышивка и бисер
            slug: melkaya_vyshivka_i_biser
            image: /recommendations/dramatic/details/melkaya_vyshivka_i_biser.jpg
          - text: Милая фурнитура в кукольном стиле
            slug: milaya_furnitura_v_kukolnom
            image: /recommendations/dramatic/details/milaya_furnitura_v_kukolnom.jpg
      - key: "jackets"
        title: "Жакеты и верхняя одежда"
        description: >-
          Верх должен удлинять фигуру и держать плечо. Длина — либо
          точно по талии, либо заметно ниже бёдер.
        recommended:
          - text: Длинное прямое пальто до середины голени
            slug: dlinnoe_pryamoe_palto_do
            image: /recommendations/dramatic/jackets/dlinnoe_pryamoe_palto_do.jpg
          - text: Удлинённый блейзер с острыми плечами
            slug: udlinennyi_bleizer_s_ostrymi
            image: /recommendations/dramatic/jackets/udlinennyi_bleizer_s_ostrymi.jpg
          - text: Тренч с поясом и чёткой линией плеча
            slug: trench_s_poyasom_i
            image: /recommendations/dramatic/jackets/trench_s_poyasom_i.jpg
          - text: Кожаный байкер с архитектурными швами
            slug: kozhanyi_baiker_s_arhitekturnymi
            image: /recommendations/dramatic/jackets/kozhanyi_baiker_s_arhitekturnymi.jpg
          - text: Двубортный жакет с удлинённым силуэтом
            slug: dvubortnyi_zhaket_s_udlinennym
            image: /recommendations/dramatic/jackets/dvubortnyi_zhaket_s_udlinennym.jpg
        avoid:
          - text: Укороченные пуховики с объёмными подушками
            slug: ukorochennye_puhoviki_s_obemnymi
            image: /recommendations/dramatic/jackets/ukorochennye_puhoviki_s_obemnymi.jpg
          - text: Мягкие кардиганы без плечевой линии
            slug: myagkie_kardigany_bez_plechevoi
            image: /recommendations/dramatic/jackets/myagkie_kardigany_bez_plechevoi.jpg
          - text: Тедди-куртки и пушистая верхняя одежда
            slug: teddi_kurtki_i_pushistaya
            image: /recommendations/dramatic/jackets/teddi_kurtki_i_pushistaya.jpg
      - key: "tops"
        title: "Верх — рубашки, блузы, топы"
        description: >-
          Верх работает на длину шеи и линию плеча. Никаких милых
          деталей у лица.
        recommended:
          - text: Рубашка с острым воротником
            slug: rubashka_s_ostrym_vorotnikom
            image: /recommendations/dramatic/tops/rubashka_s_ostrym_vorotnikom.jpg
          - text: Шёлковая блуза с V-вырезом
            slug: shelkovaya_bluza_s_v
            image: /recommendations/dramatic/tops/shelkovaya_bluza_s_v.jpg
          - text: Водолазка из гладкого трикотажа
            slug: vodolazka_iz_gladkogo_trikotazha
            image: /recommendations/dramatic/tops/vodolazka_iz_gladkogo_trikotazha.jpg
          - text: Боди с чёткой горловиной
            slug: bodi_s_chetkoi_gorlovinoi
            image: /recommendations/dramatic/tops/bodi_s_chetkoi_gorlovinoi.jpg
          - text: Топ-корсет с прямой линией
            slug: top_korset_s_pryamoi
            image: /recommendations/dramatic/tops/top_korset_s_pryamoi.jpg
        avoid:
          - text: Блузы с бантами и оборками
            slug: bluzy_s_bantami_i
            image: /recommendations/dramatic/tops/bluzy_s_bantami_i.jpg
          - text: Топы с пышными рукавами
            slug: topy_s_pyshnymi_rukavami
            image: /recommendations/dramatic/tops/topy_s_pyshnymi_rukavami.jpg
          - text: Рубашки с мелкой оборкой по планке
            slug: rubashki_s_melkoi_oborkoi
            image: /recommendations/dramatic/tops/rubashki_s_melkoi_oborkoi.jpg
      - key: "emphasize"
        title: "На чём делать акцент"
        description: >-
          Подчёркивайте то, что даёт драматическая природа — длину,
          остроту и вертикаль.
        recommended:
          - text: Длина линий — от плеча до пола
            slug: dlina_linii_ot_plecha
            image: /recommendations/dramatic/emphasize/dlina_linii_ot_plecha.jpg
          - text: Острые скулы и ключицы
            slug: ostrye_skuly_i_klyuchitsy
            image: /recommendations/dramatic/emphasize/ostrye_skuly_i_klyuchitsy.jpg
          - text: Высокая посадка и удлинённые ноги
            slug: vysokaya_posadka_i_udlinennye
            image: /recommendations/dramatic/emphasize/vysokaya_posadka_i_udlinennye.jpg
          - text: Чёткая линия плеч
            slug: chetkaya_liniya_plech
            image: /recommendations/dramatic/emphasize/chetkaya_liniya_plech.jpg
        avoid:
          - text: Округление форм
            slug: okruglenie_form
            image: /recommendations/dramatic/emphasize/okruglenie_form.jpg
          - text: Мелкое дробление фигуры поясами и ярусами
            slug: melkoe_droblenie_figury_poyasami
            image: /recommendations/dramatic/emphasize/melkoe_droblenie_figury_poyasami.jpg
      - key: "avoid_overall"
        title: "Чего избегать в целом"
        description: >-
          Общие правила — они важнее любой отдельной вещи.
        recommended: []
        avoid:
          - text: Мягкая романтика и пастельная нежность
            slug: myagkaya_romantika_i_pastelnaya
            image: /recommendations/dramatic/avoid_overall/myagkaya_romantika_i_pastelnaya.jpg
          - text: Мелкие детские детали
            slug: melkie_detskie_detali
            image: /recommendations/dramatic/avoid_overall/melkie_detskie_detali.jpg
          - text: Оверсайз без архитектуры
            slug: oversaiz_bez_arhitektury
            image: /recommendations/dramatic/avoid_overall/oversaiz_bez_arhitektury.jpg
          - text: Пушистые фактуры и случайная многослойность
            slug: pushistye_faktury_i_sluchainaya
            image: /recommendations/dramatic/avoid_overall/pushistye_faktury_i_sluchainaya.jpg
  natural:
    style_key: "Ширина, непринуждённость, матовая фактура"
    summary: >-
      Ваша сила — лёгкая, расслабленная линия с ощущением простора. Вам
      идут широкие, слегка размытые силуэты, матовые натуральные ткани
      и спокойные тона. Слишком жёсткая архитектура делает образ
      «застёгнутым» — вам же нужна свобода и воздух.
    closing_note: >-
      Правило натуральной: если сомневаетесь между строгим и расслабленным
      — выбирайте расслабленное, но с чётким плечом. Это ваш баланс.
    sections:
      - key: "lines_silhouette"
        title: "Линии и силуэт"
        description: >-
          Широкие, свободные, чуть «размытые» линии. Силуэт читается как
          мягкая геометрия — не слишком острая, не слишком округлая.
        recommended:
          - text: Прямые и чуть трапециевидные силуэты
            slug: pryamye_i_chut_trapetsievidnye
            image: /recommendations/natural/lines_silhouette/pryamye_i_chut_trapetsievidnye.jpg
          - text: Свободные брюки с лёгким заломом
            slug: svobodnye_bryuki_s_legkim
            image: /recommendations/natural/lines_silhouette/svobodnye_bryuki_s_legkim.jpg
          - text: Длинные рубашки-платья
            slug: dlinnye_rubashki_platya
            image: /recommendations/natural/lines_silhouette/dlinnye_rubashki_platya.jpg
          - text: Оверсайз жакеты и мягкие плечи
            slug: oversaiz_zhakety_i_myagkie
            image: /recommendations/natural/lines_silhouette/oversaiz_zhakety_i_myagkie.jpg
          - text: Удлинённые туники
            slug: udlinennye_tuniki
            image: /recommendations/natural/lines_silhouette/udlinennye_tuniki.jpg
        avoid:
          - text: Слишком притянутые фигуре силуэты
            slug: slishkom_prityanutye_figure_siluety
            image: /recommendations/natural/lines_silhouette/slishkom_prityanutye_figure_siluety.jpg
          - text: Очень острые, жёсткие линии
            slug: ochen_ostrye_zhestkie_linii
            image: /recommendations/natural/lines_silhouette/ochen_ostrye_zhestkie_linii.jpg
          - text: Миниатюрные пропорции и «кукольные» образы
            slug: miniatyurnye_proportsii_i_kukolnye
            image: /recommendations/natural/lines_silhouette/miniatyurnye_proportsii_i_kukolnye.jpg
      - key: "necklines"
        title: "Вырезы и горловины"
        description: >-
          Вырез должен быть простым и немного небрежным — как будто
          линия сложилась сама.
        recommended:
          - text: Широкий V-вырез
            slug: shirokii_v_vyrez
            image: /recommendations/natural/necklines/shirokii_v_vyrez.jpg
          - text: Лодочка с мягкой линией
            slug: lodochka_s_myagkoi_liniei
            image: /recommendations/natural/necklines/lodochka_s_myagkoi_liniei.jpg
          - text: Хенли с несколькими пуговицами
            slug: henli_s_neskolkimi_pugovitsami
            image: /recommendations/natural/necklines/henli_s_neskolkimi_pugovitsami.jpg
