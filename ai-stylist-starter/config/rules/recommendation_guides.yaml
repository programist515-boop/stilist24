recommendation_guides:
  dramatic:
    style_key: "Длинная вертикаль, острые линии, крупный масштаб"
    summary: >-
      Ваша природа — длина, острота и чистая вертикаль. Лучше всего вы
      смотритесь в образах с сильной линией, отчётливой архитектурой и
      тканями, которые держат форму. Избегайте мягкости, мелких деталей и
      уютных округлостей — они спорят с вашей внутренней геометрией.
    closing_note: >-
      Правило одного образа: одна сильная вертикальная линия, одна крупная
      деталь, одна точная акцентная точка. Всё остальное работает в
      поддержке.
    sections:
      - key: "lines_silhouette"
        title: "Линии и силуэт"
        description: >-
          Удлинённые, острые, архитектурные силуэты. Линии должны читаться
          одним непрерывным движением сверху вниз.
        recommended:
          - "Прямые, узкие, удлинённые силуэты"
          - "Острые плечи и чёткие лацканы"
          - "Строгие колонны — платья-футляры, брюки-сигареты, длинные пальто"
          - "Одна длинная вертикаль — монохром, длинный жакет, высокая посадка"
          - "Контрастные разрезы и удлиняющие швы"
        avoid:
          - "Округлые, мягкие, «детские» силуэты"
          - "Многослойность с мелкими оборками"
          - "Пышные юбки миди и романтические формы"
          - "Укороченные куртки с кукольными пропорциями"
      - key: "necklines"
        title: "Вырезы и горловины"
        description: >-
          Линия выреза должна продолжать вертикаль и подчёркивать длину
          шеи и остроту ключиц.
        recommended:
          - "V-образный и глубокий V"
          - "Острый каре с прямыми углами"
          - "Широкий лодочный при крепкой плечевой линии"
          - "Высокая стойка в сочетании с открытым декольте спины"
          - "Асимметричный вырез на одно плечо"
        avoid:
          - "Круглый мягкий вырез с рюшами"
          - "Питер-пэн и мелкие воротнички"
          - "Горловины с оборками и присборенные волны"
      - key: "fabrics"
        title: "Ткани"
        description: >-
          Материалы должны держать форму и давать чёткий блик или
          графичную матовость.
        recommended:
          - "Габардин, тонкая камвольная шерсть, плотный креп"
          - "Кожа и эко-кожа с гладкой поверхностью"
          - "Жаккард с крупным геометрическим рисунком"
          - "Шёлк-сатин, дюшес, тафта"
          - "Плотный атлас и полированный хлопок"
        avoid:
          - "Букле, вязаный пух, ворсистый твид"
          - "Мягкий кашемир без структуры"
          - "Хлопковая марля и лёгкий муслин"
          - "Шифон с мелкой оборкой"
      - key: "textures"
        title: "Фактуры"
        description: >-
          Фактура работает на вас, когда она графична и даёт свет, а не
          пушистость.
        recommended:
          - "Гладкие полированные поверхности"
          - "Блестящая кожа, патент, металлик"
          - "Крупный рельеф с чёткими линиями"
        avoid:
          - "Мохер, ангора, пушистые трикотажи"
          - "Мятые, случайные, «домашние» фактуры"
          - "Мелкий декоративный ворс"
      - key: "prints"
        title: "Принты"
        description: >-
          Принт — это ещё одна линия. Работают крупные, графичные и
          контрастные мотивы.
        recommended:
          - "Крупная геометрия и полоса"
          - "Абстрактные мазки большого масштаба"
          - "Контрастный анималистический принт"
          - "Строгая клетка виндзор или глен"
        avoid:
          - "Мелкий цветочек и горошек"
          - "Акварельные растяжки без чёткой формы"
          - "Сладкие пейсли с мелким узором"
      - key: "details"
        title: "Детали и декор"
        description: >-
          Детали — точечные и крупные. Меньше элементов, но каждый
          читается.
        recommended:
          - "Острые металлические элементы"
          - "Крупные пуговицы и массивная фурнитура"
          - "Чёткие складки и стрелки"
          - "Графичные лацканы и прямые манжеты"
        avoid:
          - "Бантики, рюши, оборки"
          - "Мелкая вышивка и бисер"
          - "Милая фурнитура в кукольном стиле"
      - key: "jackets"
        title: "Жакеты и верхняя одежда"
        description: >-
          Верх должен удлинять фигуру и держать плечо. Длина — либо
          точно по талии, либо заметно ниже бёдер.
        recommended:
          - "Длинное прямое пальто до середины голени"
          - "Удлинённый блейзер с острыми плечами"
          - "Тренч с поясом и чёткой линией плеча"
          - "Кожаный байкер с архитектурными швами"
          - "Двубортный жакет с удлинённым силуэтом"
        avoid:
          - "Укороченные пуховики с объёмными подушками"
          - "Мягкие кардиганы без плечевой линии"
          - "Тедди-куртки и пушистая верхняя одежда"
      - key: "tops"
        title: "Верх — рубашки, блузы, топы"
        description: >-
          Верх работает на длину шеи и линию плеча. Никаких милых
          деталей у лица.
        recommended:
          - "Рубашка с острым воротником"
          - "Шёлковая блуза с V-вырезом"
          - "Водолазка из гладкого трикотажа"
          - "Боди с чёткой горловиной"
          - "Топ-корсет с прямой линией"
        avoid:
          - "Блузы с бантами и оборками"
          - "Топы с пышными рукавами"
          - "Рубашки с мелкой оборкой по планке"
      - key: "emphasize"
        title: "На чём делать акцент"
        description: >-
          Подчёркивайте то, что даёт драматическая природа — длину,
          остроту и вертикаль.
        recommended:
          - "Длина линий — от плеча до пола"
          - "Острые скулы и ключицы"
          - "Высокая посадка и удлинённые ноги"
          - "Чёткая линия плеч"
        avoid:
          - "Округление форм"
          - "Мелкое дробление фигуры поясами и ярусами"
      - key: "avoid_overall"
        title: "Чего избегать в целом"
        description: >-
          Общие правила — они важнее любой отдельной вещи.
        recommended: []
        avoid:
          - "Мягкая романтика и пастельная нежность"
          - "Мелкие детские детали"
          - "Оверсайз без архитектуры"
          - "Пушистые фактуры и случайная многослойность"
  natural:
    style_key: "Ширина, непринуждённость, матовая фактура"
    summary: >-
      Ваша сила — лёгкая, расслабленная линия с ощущением простора. Вам
      идут широкие, слегка размытые силуэты, матовые натуральные ткани
      и спокойные тона. Слишком жёсткая архитектура делает образ
      «застёгнутым» — вам же нужна свобода и воздух.
    closing_note: >-
      Правило натуральной: если сомневаетесь между строгим и расслабленным
      — выбирайте расслабленное, но с чётким плечом. Это ваш баланс.
    sections:
      - key: "lines_silhouette"
        title: "Линии и силуэт"
        description: >-
          Широкие, свободные, чуть «размытые» линии. Силуэт читается как
          мягкая геометрия — не слишком острая, не слишком округлая.
        recommended:
          - "Прямые и чуть трапециевидные силуэты"
          - "Свободные брюки с лёгким заломом"
          - "Длинные рубашки-платья"
          - "Оверсайз жакеты и мягкие плечи"
          - "Удлинённые туники"
        avoid:
          - "Слишком притянутые фигуре силуэты"
          - "Очень острые, жёсткие линии"
          - "Миниатюрные пропорции и «кукольные» образы"
      - key: "necklines"
        title: "Вырезы и горловины"
        description: >-
          Вырез должен быть простым и немного небрежным — как будто
          линия сложилась сама.
        recommended:
          - "Широкий V-вырез"
          - "Лодочка с мягкой линией"
          - "Хенли с несколькими пуговицами"
          - "Распахнутая рубашка с открытой ключицей"
          - "Слегка растянутый ворот футболки"
        avoid:
          - "Сложные воротники с декором"
          - "Жёстко стоящие стойки"
          - "Вырезы с бантами и оборками"
      - key: "fabrics"
        title: "Ткани"
        description: >-
          Натуральные матовые материалы — с ощущением текстуры и веса.
        recommended:
          - "Лён и льняные смеси"
          - "Мягкая хлопковая саржа"
          - "Грубая шерсть и твид"
          - "Замша и матовая кожа"
          - "Шамбре и плотный хлопок"
        avoid:
          - "Жёсткий глянец и патент"
          - "Тонкий шёлк и шифон"
          - "Острый креп с чёткой формой"
      - key: "textures"
        title: "Фактуры"
        description: >-
          Ваша тема — осязаемая, честная фактура. Она должна читаться
          глазом и рукой.
        recommended:
          - "Букле, твид, вязаная шерсть"
          - "Замша, нубук, матовая кожа"
          - "Лён с видимой нитью"
          - "Плетёные, крафтовые фактуры"
        avoid:
          - "Зеркальный глянец"
          - "Стерильно гладкая полированная ткань"
          - "Мелкий блестящий декор"
      - key: "prints"
        title: "Принты"
        description: >-
          Принты работают, когда они «органичные» — как если бы рисунок
          вырос сам.
        recommended:
          - "Крупная естественная клетка"
          - "Ботанические и растительные мотивы"
          - "Этнические и племенные узоры"
          - "Выцветшие пятна тай-дай"
          - "Натуральные разводы"
        avoid:
          - "Геометрия в стиле оп-арт"
          - "Слишком правильный узор"
          - "Мелкий сладкий цветочек"
      - key: "details"
        title: "Детали и декор"
        description: >-
          Минимум декоративного — максимум функционального.
        recommended:
          - "Крупные накладные карманы"
          - "Деревянные и роговые пуговицы"
          - "Кожаные ремни с простой пряжкой"
          - "Видимые швы и кант"
        avoid:
          - "Мелкая вышивка и стразы"
          - "Декоративные бантики"
          - "Жёстко симметричные элементы"
      - key: "jackets"
        title: "Жакеты и верхняя одежда"
        description: >-
          Верх держит плечо, но не зажимает фигуру. Длина — средняя или
          удлинённая.
        recommended:
          - "Блейзер-оверсайз из твида"
          - "Кожаный или замшевый бомбер"
          - "Тренч со свободным плечом"
          - "Парка с накладными карманами"
          - "Кардиган-пальто крупной вязки"
        avoid:
          - "Жёстко структурированный пиджак с подкладкой"
          - "Короткие приталенные куртки"
          - "Блестящие пуховики"
      - key: "tops"
        title: "Верх — рубашки, блузы, топы"
        description: >-
          Верх должен дышать и давать лёгкое движение.
        recommended:
          - "Льняная рубашка свободного кроя"
          - "Хлопковая майка с бельевой бретелью"
          - "Мягкая водолазка тонкой вязки"
          - "Рубашка-оверсайз"
          - "Простая футболка качественного хлопка"
        avoid:
          - "Строгие блузы с жабо"
          - "Топы с пышным рукавом и бантами"
          - "Жёсткие корсетные верхи"
      - key: "emphasize"
        title: "На чём делать акцент"
        description: >-
          Используйте свою открытую линию плеч и естественный рост.
        recommended:
          - "Лёгкость движения"
          - "Длина ноги в прямых брюках"
          - "Открытая ключица и плечо"
          - "Матовая естественная кожа"
        avoid:
          - "Жёсткая симметрия"
          - "Мелкое дробление фигуры поясами на талии"
      - key: "avoid_overall"
        title: "Чего избегать в целом"
        description: >-
          Натуральной противопоказано всё слишком «застёгнутое».
        recommended: []
        avoid:
          - "Жёсткий кутюрный крой"
          - "Глянец и лак"
          - "Милые кукольные детали"
          - "Плотно облегающие силуэты"
  classic:
    style_key: "Баланс, симметрия, умеренность"
    summary: >-
      Ваша природа — равновесие. Всё в вас работает через симметрию и
      умеренность, и одежда должна это поддерживать. Избегайте крайностей
      в любую сторону: слишком острого, слишком мягкого, слишком крупного
      или слишком мелкого. Ваш конёк — безупречная середина.
    closing_note: >-
      Правило классической: никаких «слишком». Слишком свободно —
      уберите объём. Слишком остро — смягчите линию. Середина — ваш
      сильный ход.
    sections:
      - key: "lines_silhouette"
        title: "Линии и силуэт"
        description: >-
          Сбалансированные, симметричные, полированные силуэты. Ничего
          экстремального — ни в объёме, ни в крое.
        recommended:
          - "Прямые силуэты с лёгкой приталенностью"
          - "Платье-футляр миди"
          - "Костюм-двойка классического кроя"
          - "Пальто до колена с чистой линией"
          - "Юбка-карандаш"
        avoid:
          - "Радикальный оверсайз"
          - "Ультра-острая архитектура"
          - "Экстремально короткие или драпированные формы"
      - key: "necklines"
        title: "Вырезы и горловины"
        description: >-
          Вырез — симметричный и умеренный. Никаких смещений и
          асимметрии.
        recommended:
          - "Умеренный V-вырез"
          - "Классический круглый вырез"
          - "Рубашечный воротник"
          - "Лодочка средней ширины"
          - "Округлый вырез умеренной глубины"
        avoid:
          - "Ассиметричные вырезы"
          - "Глубокое декольте"
          - "Сложные декоративные воротники"
      - key: "fabrics"
        title: "Ткани"
        description: >-
          Ткани должны быть качественными, полированными и спокойными.
        recommended:
          - "Тонкая камвольная шерсть крепкого плетения"
          - "Шёлк в закрытой форме"
          - "Хлопок-поплин"
          - "Мягкий твид среднего веса"
          - "Кашемир среднего веса"
        avoid:
          - "Блестящий лак"
          - "Слишком грубый лён"
          - "Прозрачные и экзотические материалы"
      - key: "textures"
        title: "Фактуры"
        description: >-
          Фактура ровная, ухоженная, без контрастов.
        recommended:
          - "Гладкая полированная поверхность"
          - "Мелкая ровная вязка"
          - "Аккуратный матовый финиш"
        avoid:
          - "Пушистые и лохматые фактуры"
          - "Крупный нарочитый рельеф"
          - "Металлический блеск"
      - key: "prints"
        title: "Принты"
        description: >-
          Принты — маленькие, классические, симметричные.
        recommended:
          - "Полоска средней толщины"
          - "Мелкая клетка — гусиная лапка, виши"
          - "Классический фулард"
          - "Сдержанный пейсли"
          - "Маленький симметричный цветок"
        avoid:
          - "Крупные абстрактные мазки"
          - "Анималистические принты большого масштаба"
          - "Яркий тай-дай"
      - key: "details"
        title: "Детали и декор"
        description: >-
          Детали — скрытые, дорогие, функциональные.
        recommended:
          - "Идеально выверенные лацканы"
          - "Скрытые швы и канты"
          - "Перламутровые или обтянутые тканью пуговицы"
          - "Аккуратная строчка"
        avoid:
          - "Кричащая фурнитура"
          - "Декоративные разрезы и порезы"
          - "Слишком милые детали"
      - key: "jackets"
        title: "Жакеты и верхняя одежда"
        description: >-
          Верх — эталонный, с идеальной посадкой.
        recommended:
          - "Однобортный блейзер до бедра"
          - "Тренч классической длины"
          - "Пальто-бушлат"
          - "Пиджак безукоризненной посадки"
          - "Пальто-честерфилд"
        avoid:
          - "Оверсайз с падающей линией плеч"
          - "Коротко обрезанные куртки"
          - "Структурно-экстремальные формы"
      - key: "tops"
        title: "Верх — рубашки, блузы, топы"
        description: >-
          Верх — спокойный, идеально сидящий, с тонкой работой.
        recommended:
          - "Белая рубашка классического кроя"
          - "Шёлковая блуза с мягкими пуговицами"
          - "Трикотажный джемпер тонкой вязки"
          - "Рубашка-поло из тонкого хлопка"
          - "Блуза с бантом умеренного размера"
        avoid:
          - "Оверсайз-рубашки"
          - "Кроп-топы"
          - "Топы с экстремальным декольте"
      - key: "emphasize"
        title: "На чём делать акцент"
        description: >-
          Работайте на качество и симметрию — это ваш козырь.
        recommended:
          - "Безупречная посадка"
          - "Качество тканей"
          - "Умеренный силуэт"
          - "Тонкая работа деталей"
        avoid:
          - "Экстремальные пропорции"
          - "Слишком смелые эксперименты"
      - key: "avoid_overall"
        title: "Чего избегать в целом"
        description: >-
          Классической противопоказаны крайности.
        recommended: []
        avoid:
          - "Радикальные формы"
          - "Кричащие принты"
          - "Грубая брутальность"
          - "Сладкая кукольная эстетика"
  gamine:
    style_key: "Компактность, контраст, игра пропорций"
    summary: >-
      Ваша сила — компактность и контраст. Вам идут укороченные линии,
      ломаные пропорции, яркие детали и всё, что даёт зрителю «точку
      сборки». Длинные монохромные образы без контрастов делают фигуру
      бесформенной — вам нужна игра и дробление.
    closing_note: >-
      Правило гамин: никогда не носите одну длинную линию. Ломайте её
      поясом, цветом или контрастной деталью — это ваш фирменный ход.
    sections:
      - key: "lines_silhouette"
        title: "Линии и силуэт"
        description: >-
          Короткие, ломаные, чёткие линии. Образ читается как
          собранный пазл из заметных частей.
        recommended:
          - "Укороченные жакеты и куртки"
          - "Приталенные силуэты с чёткой талией"
          - "Кроп-топы и укороченные блузы"
          - "Юбка выше колена с чёткой линией"
          - "Брюки-сигареты длиной 7/8"
        avoid:
          - "Длинные однотонные платья до пола"
          - "Оверсайз без структуры"
          - "Тяжёлые драпировки"
      - key: "necklines"
        title: "Вырезы и горловины"
        description: >-
          Вырез должен давать чёткую графичную точку у лица.
        recommended:
          - "Круглый вырез с контрастной окантовкой"
          - "Небольшой острый V"
          - "Питер-пэн и жёсткий отложной воротник"
          - "Квадратный вырез с чёткими углами"
          - "Вырез лодочкой средней ширины"
        avoid:
          - "Драпированные свободные вырезы"
          - "Глубокое мягкое декольте"
          - "Пышные жабо и мягкие каскады"
      - key: "fabrics"
        title: "Ткани"
        description: >-
          Ткани — упругие, хрустящие, держащие форму.
        recommended:
          - "Упругий хлопок и поплин"
          - "Плотный трикотаж тонкой вязки"
          - "Мягкая кожа с чёткой линией"
          - "Лакированная кожа"
          - "Плотный жаккард"
        avoid:
          - "Мягкий драпирующийся шёлк"
          - "Пушистый мохер"
          - "Ткани, теряющие форму"
      - key: "textures"
        title: "Фактуры"
        description: >-
          Фактура — контрастная, чёткая, часто блестящая.
        recommended:
          - "Патент и лакированная кожа"
          - "Контрастные комбинации гладкого и фактурного"
          - "Мелкий рельеф с чёткой линией"
          - "Пайетки и металлик"
        avoid:
          - "Размытые мягкие фактуры"
          - "Крупный небрежный твид"
          - "Однородная пушистость"
      - key: "prints"
        title: "Принты"
        description: >-
          Принты — небольшие, контрастные, с чёткой геометрией.
        recommended:
          - "Горошек малого и среднего размера"
          - "Чёрно-белая графика"
          - "Полоска тонкая контрастная"
          - "Маленькая клетка"
          - "Геометрическая плитка"
        avoid:
          - "Крупные абстрактные мазки"
          - "Акварельные разводы"
          - "Мягкие романтические цветы"
      - key: "details"
        title: "Детали и декор"
        description: >-
          Детали — игривые, яркие, с точной посадкой.
        recommended:
          - "Контрастные пуговицы"
          - "Фигурные карманы"
          - "Цветные молнии"
          - "Декоративные бантики в точке фокуса"
          - "Контрастная отделка горловины и манжет"
        avoid:
          - "Аморфные драпировки"
          - "Слишком скрытый минимализм"
          - "Крупная брутальная фурнитура"
      - key: "jackets"
        title: "Жакеты и верхняя одежда"
        description: >-
          Верх — короткий, чёткий, с заметной деталью.
        recommended:
          - "Укороченный жакет с контрастной отделкой"
          - "Кожаный байкер маленького размера"
          - "Бомбер с чёткой резинкой"
          - "Жакет-бокс в стиле Шанель"
          - "Укороченный тренч"
        avoid:
          - "Длинные оверсайз-пальто"
          - "Мягкие халаты-кардиганы"
          - "Куртки с размытой линией плеча"
      - key: "tops"
        title: "Верх — рубашки, блузы, топы"
        description: >-
          Верх — короткий и графичный, часто с декоративной деталью.
        recommended:
          - "Кроп-топ с чёткой линией"
          - "Рубашка с воротником «питер-пэн»"
          - "Блуза в горошек"
          - "Джемпер с контрастной каймой"
          - "Блуза с бантом у горла"
        avoid:
          - "Длинные оверсайз-рубашки"
          - "Блузы с мягкими драпировками"
          - "Джемперы с опущенным плечом"
      - key: "emphasize"
        title: "На чём делать акцент"
        description: >-
          Акцентируйте игру пропорций — это ваш фирменный ход.
        recommended:
          - "Чёткая талия"
          - "Тонкие запястья и щиколотки"
          - "Лицо — обрамляйте яркой деталью"
          - "Контраст верха и низа"
        avoid:
          - "Удлинение одной непрерывной линией"
          - "Монохром без акцента"
      - key: "avoid_overall"
        title: "Чего избегать в целом"
        description: >-
          Типологии гамин противопоказаны длинные аморфные образы.
        recommended: []
        avoid:
          - "Длинная непрерывная вертикаль"
          - "Тяжёлая драпировка"
          - "Оверсайз без талии"
          - "Монохром без контраста"
  romantic:
    style_key: "Мягкость, кривая, женственная округлость"
    summary: >-
      Ваша природа — мягкость и плавная кривая. Вам идут округлые линии,
      подчёркнутая талия, текучие ткани и всё, что даёт ощущение
      женственности без угловатости. Жёсткая архитектура делает вас
      «зажатой» — ваш язык в другом.
    closing_note: >-
      Правило романтической типологии: хотя бы одна мягкая текучая линия в каждом
      образе. Это ваш фирменный женственный знак.
    sections:
      - key: "lines_silhouette"
        title: "Линии и силуэт"
        description: >-
          Мягкие, округлые, подчёркивающие талию силуэты. Фигура
          читается плавными изгибами.
        recommended:
          - "Платья с отрезной талией"
          - "Приталенный верх + пышная юбка"
          - "Халат на запах"
          - "Платье косого кроя"
          - "Юбка-солнце или полусолнце"
        avoid:
          - "Жёсткие прямые силуэты без талии"
          - "Острые архитектурные формы"
          - "Слишком мужественный крой"
      - key: "necklines"
        title: "Вырезы и горловины"
