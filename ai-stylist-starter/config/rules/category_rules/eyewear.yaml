category: eyewear
rules:

  flamboyant_gamine:
    prefer:
      shape: [angular, cat_eye, geometric]
      frame: [contrasting, bold_color, animal_print_bold]
      size: [medium, bold_medium]
    stop:
      - rule: round_soft_frames
        reason: "Круглые мягкие оправы — противоположность угловатости"
      - rule: rimless_delicate
        reason: "Тонкие безободковые — не создают контраст"
      - rule: aviator_classic
        reason: "Классические авиаторы нейтральны, не добавляют дерзости"
    notes:
      - "Угловатая форма + контрастная оправа — визитная карточка."
      - "Смелые, современные или авангардные формы — всё подходит."

